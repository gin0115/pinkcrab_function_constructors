# https://github.com/mmistakes/minimal-mistakes/blob/master/_config.yml


github_username: gin0115
minimal_mistakes_skin: default
search: true
search_provider: algolia

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache
  - jekyll-algolia

algolia:
  application_id: 9A26W2EM0P
  index_name: function_constructors
  search_only_api_key: 9c0bd26d6949450b8526c511a47a97ad
  powered_by: false
  settings:
    searchableAttributes:
      - unordered(title)
      - unordered(content)
      - group
      - subgroup
      - categories
      - tags
    attributesForFaceting:
      - group
      - subgroup
      - tags

# Build settings
remote_theme: mmistakes/minimal-mistakes
aux_links:
  "Function Constructors":
    - "//github.com/gin0115/pinkcrab_function_constructors"

title: PinkCrab Function Constructors
masthead_title: PinkCrab Function Constructors
tagline: Create functions from functions with PHP
description: >-
  A package which allow for the use of common PHP Functions via partial application, ideal
  for creating new functions on the fly or piped.
logo: /img/pinkcrab-logo.png

name                     : "Glynn Quelch | PinkCrab"
url: https://gin0115.github.io/pinkcrab_function_constructors
repository: gin0115/pinkcrab_function_constructors

